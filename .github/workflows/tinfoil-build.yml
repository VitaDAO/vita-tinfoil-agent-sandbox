name: Build and Attest

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      # Build and push to ghcr.io
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - id: build
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          IMAGE_LOWER=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --push \
            -t "$IMAGE_LOWER" .
          DIGEST=$(docker buildx imagetools inspect "$IMAGE_LOWER" --format '{{.Manifest.Digest}}')
          echo "image=${IMAGE_LOWER}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Built and pushed: ${IMAGE_LOWER}@${DIGEST}"

      # Update tinfoil-config.yml with the built image+digest
      - run: |
          sed -i "s|image:.*|image: \"${{ steps.build.outputs.image }}\"|" tinfoil-config.yml
          cat tinfoil-config.yml

      # Tinfoil attestation
      - uses: tinfoilsh/pri-build-action@5d450a7f30904866efc401e24484b935b7ed52dd # v0.6.1
        with:
          config-file: ${{ github.workspace }}/tinfoil-config.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: "true"
