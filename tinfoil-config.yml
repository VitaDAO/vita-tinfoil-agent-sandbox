cvm-version: 0.7.1
cpus: 2
memory: 16384

containers:
  - name: "sandbox"
    # Image is automatically updated by the GitHub Actions workflow
    # with the ghcr.io reference + SHA256 digest after build
    image: "ghcr.io/vitadao/vita-tinfoil-agent-sandbox:v0.3.1@sha256:58453f86905eb66bdee36491a385b5541055840832428ba9084e9761003a4c7c"
    env:
      - LOG_LEVEL: "info"
      - LLM_MODEL_ID: "minimax-m2.5"
      - LLM_MODEL_NAME: "minimax-m2.5"
    secrets:
      - LLM_BASE_URL
      - LLM_API_KEY
      - QMD_API_SECRET
      - QMD_GPU_URL
      - CRON_WEBHOOK_SECRET
    command: []

shim:
  upstream-port: 3000
  paths:
    - /invoke
    - /ingest
    - /health
