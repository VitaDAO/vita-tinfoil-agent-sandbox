cvm-version: 0.7.1
cpus: 2
memory: 16384

containers:
  - name: "sandbox"
    # Image is automatically updated by the GitHub Actions workflow
    # with the ghcr.io reference + SHA256 digest after build
    image: "ghcr.io/vitadao/vita-tinfoil-agent-sandbox:v0.3.2@sha256:4e872bbd527f2f0fe921820160c556c81d5e55513e4b22a3639763ce6888e4c5"
    env:
      - LOG_LEVEL: "info"
      - LLM_MODEL_ID: "MiniMaxAI/MiniMax-M2.5"
      - LLM_MODEL_NAME: "MiniMax M2.5"
    secrets:
      - LLM_BASE_URL
      - LLM_API_KEY
      - QMD_API_SECRET
      - QMD_GPU_URL
      - CRON_WEBHOOK_SECRET
      - SANDBOX_AUTH_SECRET
      - SUPABASE_URL
      - SUPABASE_SERVICE_ROLE_KEY
    command: []

shim:
  upstream-port: 3000
  paths:
    - /invoke
    - /unlock
    - /ingest
    - /health
