cvm-version: 0.7.1
cpus: 2
memory: 8192

containers:
  - name: "sandbox"
    # Image is automatically updated by the GitHub Actions workflow
    # with the ghcr.io reference + SHA256 digest after build
    image: "ghcr.io/vitadao/vita-tinfoil-agent-sandbox:v0.2.3@sha256:252d7efd9c0540b2a39ac5bfb3d30d6dea2644e4852613738a76dc814f1f3e7c"
    env:
      - LOG_LEVEL: "info"
      - LLM_MODEL_ID: "minimax-m2.5"
      - LLM_MODEL_NAME: "minimax-m2.5"
    secrets:
      - LLM_BASE_URL
      - LLM_API_KEY
      - QMD_API_SECRET
      - QMD_GPU_URL
    command: []

shim:
  upstream-port: 3000
  paths:
    - /invoke
    - /ingest
    - /health
