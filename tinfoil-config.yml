cvm-version: 0.7.1
cpus: 2
memory: 8192

containers:
  - name: "sandbox"
    image: "amitvita/vita-tinfoil-sandbox:0.1.0@sha256:f9c92fb0b18b965a11f756500895aa8892e181d68aa140d9a964ec30161e684d"
    env:
      - LOG_LEVEL: "info"
      - LLM_MODEL_ID: "minimax-m2.5"
      - LLM_MODEL_NAME: "minimax-m2.5"
    secrets:
      - LLM_BASE_URL
      - LLM_API_KEY
      - QMD_API_SECRET
      - QMD_GPU_URL
    command: []

shim:
  upstream-port: 3000
  paths:
    - /invoke
    - /ingest
    - /health
